name: Mboa-FloodWatch Daily Analysis

on:
  schedule:
    # S'exécute tous les jours à 02:00 UTC (environ 03:00 au Cameroun)
    - cron: '0 2 * * *'
  workflow_dispatch: # Permet de lancer l'analyse manuellement depuis GitHub

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install earthengine-api firebase-admin python-dotenv

      - name: Create Auth Files
        run: |
          # Utilisation de Heredoc pour éviter les erreurs de formatage JSON
          cat <<EOF > serviceAccountKey.json
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF
          
          cat <<EOF > .env
          ${{ secrets.ENV_FILE }}
          EOF

      - name: Run Flood Detection
        # On s'assure que le chemin vers le script est correct par rapport à la racine
        run: python backend/gee/detection_radar.py